<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickShare - P2P File Transfer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-hover: #21262d;
            --border: #30363d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79c0ff;
            --success: #238636;
            --error: #da3633;
            --warning: #d29922;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: var(--surface);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }
        h1 {
            text-align: center;
            color: var(--text);
            margin-bottom: 10px;
            font-size: 2rem;
        }
        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            background: var(--bg);
            padding: 5px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            color: var(--text-secondary);
        }
        .tab.active {
            background: var(--surface-hover);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            color: var(--accent);
            font-weight: 600;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .drop-zone {
            border: 3px dashed var(--border);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            background: var(--bg);
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent);
            background: var(--surface-hover);
        }
        .drop-zone svg {
            width: 60px;
            height: 60px;
            color: var(--accent);
            margin-bottom: 15px;
        }
        .drop-text {
            color: var(--text-secondary);
            font-size: 1rem;
        }
        .file-input { display: none; }
        
        .file-info {
            margin-top: 20px;
            padding: 20px;
            background: var(--bg);
            border-radius: 12px;
            display: none;
            border: 1px solid var(--border);
        }
        .file-info.active { display: block; }
        .file-name { font-weight: 600; color: var(--text); font-size: 1.1rem; }
        .file-size { color: var(--text-secondary); margin-top: 5px; }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        .status.info { background: rgba(88, 166, 255, 0.1); color: var(--accent); display: block; border: 1px solid rgba(88, 166, 255, 0.3); }
        .status.success { background: rgba(35, 134, 54, 0.1); color: #3fb950; display: block; border: 1px solid rgba(35, 134, 54, 0.3); }
        .status.error { background: rgba(218, 54, 51, 0.1); color: #f85149; display: block; border: 1px solid rgba(218, 54, 51, 0.3); }
        .status.warning { background: rgba(210, 153, 34, 0.1); color: #d29922; display: block; border: 1px solid rgba(210, 153, 34, 0.3); }
        
        .connection-code {
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        .connection-code.active { display: block; }
        .code-display {
            font-family: monospace;
            font-size: 2rem;
            background: var(--accent);
            color: var(--bg);
            padding: 20px 40px;
            border-radius: 12px;
            margin: 15px 0;
            letter-spacing: 8px;
            user-select: all;
            cursor: pointer;
            font-weight: 600;
        }
        .code-hint {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 10px;
        }
        
        .code-input-section {
            text-align: center;
        }
        .code-input {
            width: 100%;
            padding: 20px;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 4px;
            border: 2px solid var(--border);
            border-radius: 12px;
            margin-bottom: 20px;
            text-transform: uppercase;
            background: var(--bg);
            color: var(--text);
        }
        .code-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .btn {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            font-weight: 600;
        }
        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(88, 166, 255, 0.3);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: var(--surface-hover);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover:not(:disabled) {
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border-color: var(--accent);
        }
        
        .progress-container {
            margin-top: 20px;
            display: none;
        }
        .progress-container.active { display: block; }
        .progress-bar {
            width: 100%;
            height: 10px;
            background: var(--bg);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text {
            text-align: center;
            margin-top: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .download-section {
            margin-top: 20px;
            text-align: center;
            display: none;
        }
        .download-section.active { display: block; }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        
        .logs {
            margin-top: 20px;
            padding: 15px;
            background: var(--bg);
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--text-secondary);
            max-height: 150px;
            overflow-y: auto;
            display: none;
            border: 1px solid var(--border);
        }
        .logs.active { display: block; }
        .log-entry { margin: 3px 0; }
        .log-time { color: var(--text-secondary); opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📤 QuickShare</h1>
        <p class="subtitle">Peer-to-peer file sharing with WebRTC. No server, no limits.</p>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('send')">📤 Send</button>
            <button class="tab" onclick="switchTab('receive')">📥 Receive</button>
        </div>
        
        <!-- Send Tab -->
        <div class="tab-content active" id="send-tab">
            <div class="drop-zone" id="dropZone">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p class="drop-text">Drop file here or click to browse</p>
            </div>
            <input type="file" class="file-input" id="fileInput">
            
            <div class="file-info" id="fileInfo">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>
            </div>
            
            <div class="connection-code" id="connectionCode">
                <p>Your connection code:</p>
                <div class="code-display" id="codeDisplay" onclick="copyCode()"></div>
                <p class="code-hint">Share this code with the receiver. Click to copy.</p>
            </div>
            
            <div class="progress-container" id="sendProgress">
                <div class="progress-bar">
                    <div class="progress-fill" id="sendProgressFill"></div>
                </div>
                <div class="progress-text" id="sendProgressText">Waiting for receiver...</div>
            </div>
            
            <div class="status" id="sendStatus"></div>
        </div>
        
        <!-- Receive Tab -->
        <div class="tab-content" id="receive-tab">
            <div class="code-input-section">
                <input type="text" class="code-input" id="receiveCode" placeholder="ENTER CODE" maxlength="6" autocomplete="off">
                <button class="btn" id="connectBtn" onclick="startReceiving()">Connect & Download</button>
            </div>
            
            <div class="progress-container" id="receiveProgress">
                <div class="progress-bar">
                    <div class="progress-fill" id="receiveProgressFill"></div>
                </div>
                <div class="progress-text" id="receiveProgressText">Connecting...</div>
            </div>
            
            <div class="download-section" id="downloadSection">
                <a class="btn download-btn" id="downloadLink" href="#" download>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Download File
                </a>
            </div>
            
            <div class="status" id="receiveStatus"></div>
        </div>
        
        <div class="logs" id="logs"></div>
    </div>

    <script>
        // WebRTC Configuration
        const RTC_CONFIG = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };
        
        const CHUNK_SIZE = 16384; // 16KB chunks
        
        let peerConnection = null;
        let dataChannel = null;
        let currentFile = null;
        let receivedChunks = [];
        let receivedSize = 0;
        let expectedSize = 0;
        let fileName = '';
        let isSender = false;
        
        // DOM Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        
        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }
        
        // Logging
        function log(msg) {
            const logs = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">${new Date().toLocaleTimeString()}</span> ${msg}`;
            logs.appendChild(entry);
            logs.scrollTop = logs.scrollHeight;
        }
        
        // File drop handling
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });
        
        function handleFile(file) {
            currentFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatSize(file.size);
            document.getElementById('fileInfo').classList.add('active');
            
            showStatus('sendStatus', 'Creating connection...', 'info');
            initSender();
        }
        
        function formatSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function showStatus(id, msg, type) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'status ' + type;
        }
        
        // Generate connection code
        function generateCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }
        
        // Copy code to clipboard
        function copyCode() {
            const code = document.getElementById('codeDisplay').textContent;
            navigator.clipboard.writeText(code).then(() => {
                showStatus('sendStatus', 'Code copied to clipboard!', 'success');
                setTimeout(() => {
                    showStatus('sendStatus', 'Waiting for receiver to connect...', 'info');
                }, 1500);
            });
        }
        
        // ==================== SENDER ====================
        async function initSender() {
            isSender = true;
            const code = generateCode();
            document.getElementById('codeDisplay').textContent = code;
            document.getElementById('connectionCode').classList.add('active');
            
            // Store signaling data
            localStorage.setItem('quickshare_' + code, JSON.stringify({
                type: 'offer',
                timestamp: Date.now()
            }));
            
            peerConnection = new RTCPeerConnection(RTC_CONFIG);
            
            // Create data channel
            dataChannel = peerConnection.createDataChannel('fileTransfer', {
                ordered: true
            });
            
            dataChannel.onopen = () => {
                log('Data channel opened');
                showStatus('sendStatus', 'Connected! Starting transfer...', 'success');
                sendFile();
            };
            
            dataChannel.onclose = () => {
                log('Data channel closed');
            };
            
            // Handle ICE candidates
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    const data = JSON.parse(localStorage.getItem('quickshare_' + code) || '{}');
                    if (!data.candidates) data.candidates = [];
                    data.candidates.push(event.candidate);
                    localStorage.setItem('quickshare_' + code, JSON.stringify(data));
                }
            };
            
            // Create offer
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            // Store offer
            const data = JSON.parse(localStorage.getItem('quickshare_' + code));
            data.offer = offer;
            localStorage.setItem('quickshare_' + code, JSON.stringify(data));
            
            showStatus('sendStatus', 'Share the code below with receiver', 'info');
            
            // Poll for answer
            pollForAnswer(code);
        }
        
        async function pollForAnswer(code) {
            const checkInterval = setInterval(async () => {
                const data = JSON.parse(localStorage.getItem('quickshare_' + code) || '{}');
                
                if (data.answer && !peerConnection.remoteDescription) {
                    clearInterval(checkInterval);
                    log('Received answer');
                    await peerConnection.setRemoteDescription(data.answer);
                    
                    // Add ICE candidates from receiver
                    if (data.answerCandidates) {
                        for (const candidate of data.answerCandidates) {
                            await peerConnection.addIceCandidate(candidate);
                        }
                    }
                }
                
                // Clean up old entries (older than 5 minutes)
                if (data.timestamp && Date.now() - data.timestamp > 300000) {
                    localStorage.removeItem('quickshare_' + code);
                }
            }, 1000);
        }
        
        async function sendFile() {
            document.getElementById('sendProgress').classList.add('active');
            
            // Send file metadata
            const metadata = {
                name: currentFile.name,
                size: currentFile.size,
                type: currentFile.type
            };
            dataChannel.send(JSON.stringify({ type: 'metadata', data: metadata }));
            
            // Read and send file in chunks
            const buffer = await currentFile.arrayBuffer();
            const totalChunks = Math.ceil(buffer.byteLength / CHUNK_SIZE);
            
            for (let i = 0; i < totalChunks; i++) {
                const start = i * CHUNK_SIZE;
                const end = Math.min(start + CHUNK_SIZE, buffer.byteLength);
                const chunk = buffer.slice(start, end);
                
                dataChannel.send(chunk);
                
                const progress = ((i + 1) / totalChunks) * 100;
                document.getElementById('sendProgressFill').style.width = progress + '%';
                document.getElementById('sendProgressText').textContent = 
                    `Sending... ${Math.round(progress)}%`;
                
                // Small delay to prevent overwhelming the connection
                await new Promise(r => setTimeout(r, 0));
            }
            
            dataChannel.send(JSON.stringify({ type: 'complete' }));
            document.getElementById('sendProgressText').textContent = 'Transfer complete!';
            showStatus('sendStatus', 'File sent successfully!', 'success');
        }
        
        // ==================== RECEIVER ====================
        async function startReceiving() {
            const code = document.getElementById('receiveCode').value.toUpperCase().trim();
            if (!code || code.length !== 6) {
                showStatus('receiveStatus', 'Please enter a valid 6-character code', 'error');
                return;
            }
            
            document.getElementById('connectBtn').disabled = true;
            document.getElementById('receiveProgress').classList.add('active');
            showStatus('receiveStatus', 'Connecting...', 'info');
            
            const data = JSON.parse(localStorage.getItem('quickshare_' + code) || '{}');
            if (!data.offer) {
                showStatus('receiveStatus', 'Invalid code or sender disconnected', 'error');
                document.getElementById('connectBtn').disabled = false;
                document.getElementById('receiveProgress').classList.remove('active');
                return;
            }
            
            isSender = false;
            receivedChunks = [];
            receivedSize = 0;
            
            peerConnection = new RTCPeerConnection(RTC_CONFIG);
            
            // Handle ICE candidates
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    const stored = JSON.parse(localStorage.getItem('quickshare_' + code) || '{}');
                    if (!stored.answerCandidates) stored.answerCandidates = [];
                    stored.answerCandidates.push(event.candidate);
                    localStorage.setItem('quickshare_' + code, JSON.stringify(stored));
                }
            };
            
            // Handle incoming data channel
            peerConnection.ondatachannel = (event) => {
                dataChannel = event.channel;
                
                dataChannel.onmessage = (event) => {
                    if (typeof event.data === 'string') {
                        const msg = JSON.parse(event.data);
                        handleControlMessage(msg);
                    } else {
                        handleFileChunk(event.data);
                    }
                };
                
                dataChannel.onopen = () => {
                    log('Data channel opened');
                    document.getElementById('receiveProgressText').textContent = 'Receiving file...';
                };
            };
            
            // Set remote description (offer)
            await peerConnection.setRemoteDescription(data.offer);
            
            // Add sender's ICE candidates
            if (data.candidates) {
                for (const candidate of data.candidates) {
                    await peerConnection.addIceCandidate(candidate);
                }
            }
            
            // Create answer
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            // Store answer
            data.answer = answer;
            localStorage.setItem('quickshare_' + code, JSON.stringify(data));
            
            log('Sent answer');
        }
        
        function handleControlMessage(msg) {
            if (msg.type === 'metadata') {
                expectedSize = msg.data.size;
                fileName = msg.data.name;
                log(`Receiving: ${fileName} (${formatSize(expectedSize)})`);
            } else if (msg.type === 'complete') {
                finalizeDownload();
            }
        }
        
        function handleFileChunk(chunk) {
            receivedChunks.push(chunk);
            receivedSize += chunk.byteLength;
            
            if (expectedSize > 0) {
                const progress = (receivedSize / expectedSize) * 100;
                document.getElementById('receiveProgressFill').style.width = progress + '%';
                document.getElementById('receiveProgressText').textContent = 
                    `Receiving... ${formatSize(receivedSize)} / ${formatSize(expectedSize)}`;
            }
        }
        
        function finalizeDownload() {
            // Combine chunks
            const blob = new Blob(receivedChunks);
            const url = URL.createObjectURL(blob);
            
            const downloadLink = document.getElementById('downloadLink');
            downloadLink.href = url;
            downloadLink.download = fileName;
            
            document.getElementById('receiveProgress').classList.remove('active');
            document.getElementById('downloadSection').classList.add('active');
            showStatus('receiveStatus', 'File received successfully!', 'success');
            
            log('Download ready: ' + fileName);
        }
        
        // Clean up old entries periodically
        setInterval(() => {
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key?.startsWith('quickshare_')) {
                    const data = JSON.parse(localStorage.getItem(key));
                    if (data.timestamp && Date.now() - data.timestamp > 300000) {
                        localStorage.removeItem(key);
                    }
                }
            }
        }, 60000);
    </script>
    <footer style="text-align: center; margin-top: 30px; padding: 20px; color: var(--text-secondary); font-size: 0.85rem;">
        Built with ❤️ by QQ & Nova ☄️
    </footer>
</body>
</html>
