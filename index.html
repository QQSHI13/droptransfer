<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropTransfer - Simple File Sharing</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230d1117' rx='20'/%3E%3Ctext x='50' y='65' font-size='50' text-anchor='middle'%3E📦%3C/text%3E%3C/svg%3E">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --surface-hover: #21262d;
            --border: #30363d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --success: #238636;
            --error: #da3633;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: var(--surface);
            border-radius: 16px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border: 1px solid var(--border);
        }
        h1 {
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }
        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: var(--bg);
            padding: 4px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
        .tab.active {
            background: var(--surface-hover);
            color: var(--accent);
            font-weight: 600;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            background: var(--bg);
            transition: all 0.2s;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent);
            background: var(--surface-hover);
        }
        .drop-zone .icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }
        .drop-zone p {
            color: var(--text-secondary);
        }
        input[type="file"] { display: none; }
        
        .file-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
            display: none;
        }
        .file-card.show { display: block; }
        .file-name { font-weight: 600; word-break: break-all; }
        .file-size { color: var(--text-secondary); font-size: 0.85rem; margin-top: 4px; }
        
        .code-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
            text-align: center;
            display: none;
        }
        .code-box.show { display: block; }
        .code-label { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 8px; }
        .code-value {
            font-family: monospace;
            font-size: 1.8rem;
            color: var(--accent);
            letter-spacing: 4px;
            cursor: pointer;
            user-select: all;
        }
        .code-hint {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-top: 8px;
        }
        
        .progress-bar {
            height: 6px;
            background: var(--bg);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 16px;
            display: none;
        }
        .progress-bar.show { display: block; }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-top: 8px;
        }
        
        .code-input {
            width: 100%;
            padding: 16px;
            font-size: 1.5rem;
            text-align: center;
            letter-spacing: 4px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            margin-bottom: 12px;
            text-transform: uppercase;
        }
        .code-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .download-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-top: 16px;
            text-align: center;
            display: none;
        }
        .download-box.show { display: block; }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--success);
            color: white;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
        }
        
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 0.9rem;
            display: none;
        }
        .status.show { display: block; }
        .status.info { background: rgba(88,166,255,0.1); color: var(--accent); }
        .status.success { background: rgba(35,134,54,0.1); color: var(--success); }
        .status.error { background: rgba(218,54,51,0.1); color: var(--error); }
        
        footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 DropTransfer</h1>
        <p class="subtitle">Simple P2P file sharing. No upload limits.</p>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('send')">Send</button>
            <button class="tab" onclick="switchTab('receive')">Receive</button>
        </div>
        
        <!-- Send Tab -->
        <div class="tab-content active" id="send-tab">
            <div class="drop-zone" id="dropZone">
                <div class="icon">📤</div>
                <p>Drop file here or click to browse</p>
            </div>
            <input type="file" id="fileInput">
            
            <div class="file-card" id="fileCard">
                <div class="file-name" id="fileName"></div>
                <div class="file-size" id="fileSize"></div>
            </div>
            
            <div class="code-box" id="codeBox">
                <div class="code-label">Your transfer code:</div>
                <div class="code-value" id="peerId" onclick="copyToClipboard()"></div>
                <div class="code-hint">Share this code with receiver • Click to copy</div>
                <div class="connection-waiting" id="connectionWaiting" style="display: none; margin-top: 12px; color: var(--text-secondary); font-size: 0.85rem;">
                    ⏳ Waiting for receiver to connect...
                </div>
            </div>
            
            <div class="progress-bar" id="sendProgress">
                <div class="progress-fill" id="sendProgressFill"></div>
            </div>
            <div class="progress-text" id="sendProgressText"></div>
            
            <div class="status" id="sendStatus"></div>
        </div>
        
        <!-- Receive Tab -->
        <div class="tab-content" id="receive-tab">
            <input type="text" class="code-input" id="codeInput" placeholder="ENTER CODE" maxlength="15">
            <button class="btn" id="connectBtn" onclick="connect()">Connect & Download</button>
            <button class="btn btn-secondary" id="retryBtn" onclick="resetReceiver()" style="display: none; margin-top: 10px; background: var(--surface-hover); color: var(--text);">🔄 Try Again</button>
            
            <div class="progress-bar" id="receiveProgress">
                <div class="progress-fill" id="receiveProgressFill"></div>
            </div>
            <div class="progress-text" id="receiveProgressText"></div>
            
            <div class="download-box" id="downloadBox">
                <a class="download-btn" id="downloadLink" href="#" download>
                    ⬇️ Download File
                </a>
            </div>
            
            <div class="status" id="receiveStatus"></div>
        </div>
        
        <footer>
            Built with ❤️ by QQ & Nova ☄️
        </footer>
    </div>

    <script>
        let peer = null;
        let conn = null;
        let currentFile = null;
        let receivedChunks = [];
        let receivedSize = 0;
        let fileInfo = null;
        const CHUNK_SIZE = 16384;
        
        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }
        
        // File drop handling
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });
        
        function handleFile(file) {
            currentFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatSize(file.size);
            document.getElementById('fileCard').classList.add('show');
            
            showStatus('sendStatus', 'Creating peer connection...', 'info');
            initSender();
        }
        
        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function showStatus(id, msg, type) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'status show ' + type;
        }
        
        function hideStatus(id) {
            document.getElementById(id).className = 'status';
        }
        
        // ==================== SENDER ====================
        function initSender() {
            console.log('Initializing sender peer...');
            
            peer = new Peer({
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                },
                debug: 2
            });
            
            peer.on('open', (id) => {
                console.log('Sender peer ready. ID:', id);
                document.getElementById('peerId').textContent = id;
                document.getElementById('codeBox').classList.add('show');
                document.getElementById('connectionWaiting').style.display = 'block';
                showStatus('sendStatus', '✅ Ready! Share the code above with receiver', 'success');
            });
            
            peer.on('connection', (connection) => {
                console.log('Incoming connection!');
                document.getElementById('connectionWaiting').style.display = 'none';
                conn = connection;
                handleConnection();
            });
            
            peer.on('error', (err) => {
                console.error('Peer error:', err);
                showStatus('sendStatus', 'Error: ' + err.message + '. Please refresh and try again.', 'error');
            });
            
            peer.on('disconnected', () => {
                console.log('Peer disconnected');
                showStatus('sendStatus', 'Disconnected. Reconnecting...', 'info');
                peer.reconnect();
            });
        }
        
        function handleConnection() {
            console.log('Setting up connection handlers');
            
            conn.on('open', () => {
                console.log('Connection opened!');
                showStatus('sendStatus', '✅ Receiver connected! Sending file...', 'info');
                sendFile();
            });
            
            conn.on('data', (data) => {
                if (data === 'received') {
                    showStatus('sendStatus', '✅ File sent successfully!', 'success');
                }
            });
            
            conn.on('error', (err) => {
                console.error('Connection error:', err);
                showStatus('sendStatus', 'Transfer error: ' + err.message, 'error');
            });
            
            conn.on('close', () => {
                console.log('Connection closed');
            });
        }
        
        async function sendFile() {
            // Send file metadata
            conn.send({
                type: 'metadata',
                name: currentFile.name,
                size: currentFile.size
            });
            
            const buffer = await currentFile.arrayBuffer();
            const totalChunks = Math.ceil(buffer.byteLength / CHUNK_SIZE);
            
            document.getElementById('sendProgress').classList.add('show');
            
            for (let i = 0; i < totalChunks; i++) {
                const start = i * CHUNK_SIZE;
                const end = Math.min(start + CHUNK_SIZE, buffer.byteLength);
                const chunk = buffer.slice(start, end);
                
                conn.send({
                    type: 'chunk',
                    data: chunk,
                    index: i,
                    total: totalChunks
                });
                
                const progress = ((i + 1) / totalChunks) * 100;
                document.getElementById('sendProgressFill').style.width = progress + '%';
                document.getElementById('sendProgressText').textContent = 
                    `Sending... ${Math.round(progress)}%`;
                
                // Small delay to prevent overwhelming
                await new Promise(r => setTimeout(r, 5));
            }
            
            conn.send({ type: 'done' });
            document.getElementById('sendProgressText').textContent = 'Transfer complete!';
        }
        
        function copyToClipboard() {
            const code = document.getElementById('peerId').textContent;
            navigator.clipboard.writeText(code);
            showStatus('sendStatus', 'Code copied!', 'success');
            setTimeout(() => {
                showStatus('sendStatus', 'Ready! Waiting for receiver...', 'success');
            }, 1500);
        }
        
        // ==================== RECEIVER ====================
        function connect() {
            const code = document.getElementById('codeInput').value.trim();
            if (!code) {
                showStatus('receiveStatus', 'Please enter a code', 'error');
                return;
            }
            
            document.getElementById('connectBtn').disabled = true;
            showStatus('receiveStatus', 'Initializing...', 'info');
            console.log('Connecting to peer:', code);
            
            // Create peer first
            peer = new Peer({
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                },
                debug: 2  // Enable debug logging
            });
            
            peer.on('open', (myId) => {
                console.log('My peer ID:', myId);
                showStatus('receiveStatus', 'Connecting to sender...', 'info');
                
                // Now connect to the sender
                conn = peer.connect(code, {
                    reliable: true,
                    serialization: 'binary'
                });
                
                setupConnectionHandlers();
            });
            
            peer.on('error', (err) => {
                console.error('Peer error:', err);
                let msg = 'Connection failed';
                if (err.type === 'peer-unavailable') {
                    msg = '❌ Sender not found. Make sure the code is correct and sender is ready.';
                } else if (err.type === 'network') {
                    msg = '❌ Network error. Check your internet connection.';
                } else if (err.type === 'server-error') {
                    msg = '❌ Server busy. Please try again in a moment.';
                } else {
                    msg = '❌ ' + err.message;
                }
                showStatus('receiveStatus', msg, 'error');
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('retryBtn').style.display = 'block';
            });
            
            // Timeout after 15 seconds
            setTimeout(() => {
                if (!conn || !conn.open) {
                    console.log('Connection timeout');
                    showStatus('receiveStatus', '⏱️ Connection timeout. Sender may be offline or code is wrong.', 'error');
                    document.getElementById('connectBtn').style.display = 'none';
                    document.getElementById('retryBtn').style.display = 'block';
                    if (peer) peer.destroy();
                }
            }, 15000);
        }
        
        function resetReceiver() {
            // Clean up
            if (conn) conn.close();
            if (peer) peer.destroy();
            conn = null;
            peer = null;
            
            // Reset UI
            document.getElementById('codeInput').value = '';
            document.getElementById('connectBtn').style.display = 'block';
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('retryBtn').style.display = 'none';
            document.getElementById('receiveProgress').classList.remove('show');
            document.getElementById('downloadBox').classList.remove('show');
            hideStatus('receiveStatus');
        }
        
        function setupConnectionHandlers() {
            conn.on('open', () => {
                console.log('Connection opened!');
                showStatus('receiveStatus', '✅ Connected! Waiting for file...', 'success');
                document.getElementById('receiveProgress').classList.add('show');
            });
            
            conn.on('data', (data) => {
                console.log('Received data:', data.type || 'chunk');
                handleData(data);
            });
            
            conn.on('error', (err) => {
                console.error('Connection error:', err);
                showStatus('receiveStatus', 'Connection error: ' + err.message, 'error');
                document.getElementById('connectBtn').disabled = false;
            });
            
            conn.on('close', () => {
                console.log('Connection closed');
            });
        }
        
        function handleData(data) {
            if (data.type === 'metadata') {
                fileInfo = data;
                receivedChunks = [];
                receivedSize = 0;
                document.getElementById('receiveProgressText').textContent = 
                    `Receiving ${fileInfo.name}...`;
            }
            else if (data.type === 'chunk') {
                receivedChunks.push(data.data);
                receivedSize += data.data.byteLength;
                
                const progress = (data.index + 1) / data.total * 100;
                document.getElementById('receiveProgressFill').style.width = progress + '%';
                document.getElementById('receiveProgressText').textContent = 
                    `Receiving... ${Math.round(progress)}% (${formatSize(receivedSize)} / ${formatSize(fileInfo.size)})`;
            }
            else if (data.type === 'done') {
                // Assemble file
                const blob = new Blob(receivedChunks);
                const url = URL.createObjectURL(blob);
                
                const downloadLink = document.getElementById('downloadLink');
                downloadLink.href = url;
                downloadLink.download = fileInfo.name;
                
                document.getElementById('downloadBox').classList.add('show');
                document.getElementById('receiveProgress').classList.remove('show');
                showStatus('receiveStatus', 'File received! Click download below.', 'success');
                
                // Notify sender
                conn.send('received');
            }
        }
    </script>
</body>
</html>
